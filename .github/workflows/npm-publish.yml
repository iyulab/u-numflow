name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'src/wasm.rs'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM package (bundler + nodejs)
        run: |
          wasm-pack build --target bundler --scope iyulab --out-dir pkg --features wasm
          wasm-pack build --target nodejs --scope iyulab --out-dir pkg-node --features wasm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Merge nodejs target (node-compatible entry via exports map)
        run: |
          NAME=$(node -p "require('./pkg/package.json').main.slice(0,-3)")
          mkdir -p pkg/node
          cp "pkg-node/${NAME}.js" "pkg/node/${NAME}.cjs"
          cp "pkg-node/${NAME}_bg.wasm" pkg/node/
          cp "pkg-node/${NAME}.d.ts" "pkg/node/${NAME}.d.cts"
          sed -i "s|@ts-self-types=\"./${NAME}.d.ts\"|@ts-self-types=\"./${NAME}.d.cts\"|" "pkg/node/${NAME}.cjs"
          node <<'EOF'
          const fs = require("fs");
          const p = JSON.parse(fs.readFileSync("pkg/package.json", "utf8"));
          const n = p.main.slice(0, -3);
          p.exports = { ".": {
            node: { types: `./node/${n}.d.cts`, default: `./node/${n}.cjs` },
            types: `./${n}.d.ts`,
            default: `./${n}.js`,
          } };
          if (!p.files.includes("node")) p.files.push("node");
          p.sideEffects = [...(p.sideEffects || []), `./node/${n}.cjs`];
          fs.writeFileSync("pkg/package.json", JSON.stringify(p, null, 2) + "\n");
          EOF

      - name: Node smoke test (CJS require + ESM import)
        run: |
          PKG_NAME=$(node -p "require('./pkg/package.json').name")
          mkdir -p "$RUNNER_TEMP/smoke" && cd "$RUNNER_TEMP/smoke"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE/pkg"
          node -e "const m = require('$PKG_NAME'); if (!Object.keys(m).length) throw new Error('empty CJS exports')"
          node --input-type=module -e "import('$PKG_NAME').then(m => { if (!Object.keys(m).length) throw new Error('empty ESM exports') })"

      - name: Publish to npm
        run: |
          cd pkg
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null; then
            echo "Version ${PKG_VER} already published, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
